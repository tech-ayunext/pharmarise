<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat_Text:wght@400;500;700&display=swap" rel="stylesheet">
  <title>Pharmarise</title>

  <!-- 🎯 GLOBAL SCALING FOR 1920x1200 TABLET -->
  <style>
    /* Prevent zoom issues on mobile */
    * {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    
    html, body {
      overflow-x: hidden;
      width: 100%;
      position: relative;
    }
    
    /* Prevent horizontal scroll on mobile */
    @media (max-width: 768px) {
      html, body {
        overflow-x: hidden !important;
        width: 100% !important;
        max-width: 100% !important;
      }
      
      #root {
        overflow-x: hidden !important;
        width: 100% !important;
        max-width: 100% !important;
      }
    }
    
    @media (min-width: 1900px) and (max-width: 1940px) and (min-height: 1180px) and (max-height: 1220px) {
      body {
        transform: scale(0.85) !important;
        transform-origin: top left !important;
        width: 79.65% !important;
        /* 100 / 0.85 = 117.65 */
        height: 100.65% !important;
        overflow-x: hidden !important;
       
      }

      #root {
        width: 100% !important;
        height: 100% !important;
      }
    }
  </style>


</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
